name: CI

on:
  push:
    branches: [master]
  pull_request:

jobs:
  backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: server/app/package-lock.json
      - name: Verify modules
        run: go mod tidy && git diff --exit-code
      - name: Build frontend assets for Go embed
        run: |
          npm ci --prefix server/app
          npm run build --prefix server/app
      - name: Run tests
        run: go test ./...

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: server/app
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: server/app/package-lock.json
      - name: Install dependencies
        run: npm ci
      - name: Build
        run: npm run build
