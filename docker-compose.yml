services:
  openbooks:
    build: .
    container_name: openbooks-improved
    ports:
      - "8383:80"
    volumes:
      - ./books:/books
    command: ["--random-name", "--server", "irc.irchighway.net:6667", "--tls=false", "--log", "server", "--dir", "/books", "--port", "80", "--persist", "--auto-extract"]
    environment:
      # Set credentials via environment or .env
      - AUTH_USER=${AUTH_USER:-admin}
      - AUTH_PASS=${AUTH_PASS:-change-me}
      # Optional: Set base path if behind reverse proxy
      # - BASE_PATH=/openbooks/
    restart: unless-stopped
    networks:
      - openbooks-net

networks:
  openbooks-net:
    driver: bridge
